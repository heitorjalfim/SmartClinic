<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clínica Innovare - Perfil Pessoal Cliente</title>
    <style>
        /* Estilos baseados no wireframe da imagem e no padrão do seu projeto */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #d3d3d3; /* Fundo cinza do mockup */
            margin: 0; 
            padding: 40px; 
            display: flex; 
            flex-direction: column;
            align-items: center;
        }
        
        .btn-voltar { 
            align-self: flex-start;
            margin-bottom: 20px; 
            text-decoration: none; 
            color: #007bff; 
            font-weight: bold; 
        }

        .main-container {
            display: flex;
            gap: 50px;
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        /* Coluna da Esquerda (Foto e Honra) */
        .left-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 250px;
        }

        .foto-placeholder {
            width: 200px;
            height: 150px;
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            position: relative;
            background-color: transparent;
        }

        /* Pequenos traços nos cantos para imitar o ícone de imagem do mockup */
        .foto-placeholder::before, .foto-placeholder::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 2px;
            background-color: black;
        }
        .foto-placeholder::before { top: 20px; left: 20px; transform: rotate(45deg); }
        .foto-placeholder::after { bottom: 20px; right: 20px; transform: rotate(45deg); }


        .honra-status {
            margin: 20px 0 10px 0;
            font-size: 1.5rem;
        }

        .honra-valor {
            color: #d32f2f; /* Cor vermelha de exemplo, pode ser alterada via JS depois */
            font-weight: bold;
        }

        .historico-box {
            width: 100%;
            height: 250px;
            border: 2px solid black;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Coluna da Direita (Dados Pessoais) */
        .right-column {
            flex: 1;
        }

        .dados-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .dados-box {
            border: 2px solid black;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group label {
            width: 80px; 
            font-size: 1.1rem;
        }

        .form-group input {
            flex: 1;
            padding: 8px;
            border: 2px solid black;
            background-color: #e0e0e0;
            font-size: 1rem;
            outline: none;
        }
    </style>
</head>
<body>
    
    <a href="menuClientes.html" class="btn-voltar">← Voltar para o Menu</a>
    
    <div class="main-container">
        
        <div class="left-column">
            <div class="foto-placeholder">
                Foto da cliente
            </div>
            
            <div class="honra-status">
                Honra = <span class="honra-valor" id="status-honra">Baixa</span>
            </div>
            
            <div class="historico-box" id="historico-honra">
                
            </div>
        </div>

        <div class="right-column">
            <div class="dados-title">Dados Pessoais:</div>
            
            <div class="dados-box">
                <div class="form-group">
                    <label>Nome:</label>
                    <input type="text" id="nome" readonly>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="email" readonly>
                </div>
                <div class="form-group">
                    <label>CPF:</label>
                    <input type="text" id="cpf" readonly>
                </div>
                <div class="form-group">
                    <label>Telefone:</label>
                    <input type="text" id="telefone" readonly>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
