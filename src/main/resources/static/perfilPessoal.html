<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil Pessoal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            padding: 30px 16px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 32px 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        h2 { text-align: center; margin: 0 0 28px 0; font-size: 1.4rem; }

        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 0.95rem; }

        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 18px;
            box-sizing: border-box;
            color: #333;
            background: #fff;
        }

        .btn-voltar {
            width: 100%; padding: 13px; background-color: #757575;
            color: white; border: none; border-radius: 6px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            text-align: center; text-decoration: none;
            display: block; box-sizing: border-box; margin-top: 8px;
        }

        #msg-erro { color: red; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <h2>Perfil Pessoal</h2>

    <p id="msg-erro">Paciente não encontrado.</p>

    <label>Nome:</label>
    <input type="text" id="d-nome" readonly>

    <label>Email:</label>
    <input type="email" id="d-email" readonly>

    <label>Telefone:</label>
    <input type="text" id="d-telefone" readonly>

    <label>Score de Honra:</label>
    <input type="text" id="d-score" readonly>

    <label>Total de Agendamentos:</label>
    <input type="text" id="d-total" readonly>

    <label>No-shows:</label>
    <input type="text" id="d-noshow" readonly>

    <a href="login.html" class="btn-voltar" id="btn-voltar">Voltar</a>
</div>

    <script>
        const API = 'http://localhost:8080';

        function formatarTelefone(tel) {
            if (!tel) return '—';
            const d = tel.replace(/\D/g, '');
            if (d.length === 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
            if (d.length === 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
            return tel;
        }

        async function carregarPerfil() {
            const email = sessionStorage.getItem('emailPaciente');

            if (!email) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const resp = await fetch(`${API}/api/agendamentos`);
                if (!resp.ok) throw new Error();

                const agendamentos = await resp.json();

                const encontrado = agendamentos.find(a => a.paciente?.email === email);

                if (!encontrado) throw new Error('not_found');

                const p = encontrado.paciente;

                document.getElementById('d-nome').value     = p.nome      || '—';
                document.getElementById('d-email').value    = p.email     || '—';
                document.getElementById('d-telefone').value = formatarTelefone(p.telefone || '');
                document.getElementById('d-score').value    = (p.Score_Honra ?? 100) + ' / 100';
                document.getElementById('d-total').value    = p.totalAgendamentos ?? 0;
                document.getElementById('d-noshow').value   = p.Historico_NoShow ?? 0;

            } catch {
                document.getElementById('msg-erro').style.display = 'block';
            }
        }

        document.getElementById('btn-voltar').addEventListener('click', () => {
            sessionStorage.removeItem('emailPaciente');
        });

        carregarPerfil();
    </script>
</body>
</html>
