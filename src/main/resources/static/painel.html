<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Innovare - Gestão de Risco</title>
    <style>
        :root {
            --primary: #007bff;
            --danger: #dc3545;
            --success: #28a745;
            --warning: #ffc107;
            --dark: #212529;
            --bg: #e5e5e5;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #333; color: #333;}
        
        .card { background: var(--bg); padding: 0px 20px 20px 20px; margin-bottom: 30px; border: 2px solid #000; }
        
        .header-menu { display: flex; justify-content: space-between; border-bottom: 2px solid #000; padding: 10px 0; margin-bottom: 20px; font-weight: bold;}
        .header-menu span { margin-right: 15px; cursor: pointer;}
        
        h2 { font-size: 1.2rem; font-weight: normal; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: var(--bg); border: 2px solid #000;}
        th, td { border: 2px solid #000; padding: 8px; text-align: center; font-size: 0.9rem;}
        th { background-color: #e9ecef; font-weight: normal; }
        
        .col-horario { width: 60px; }
        .col-paciente { text-align: left; }
        
        .btn-acao { background-color: var(--bg); color: #333; border: none; cursor: pointer; text-decoration: none;}
        .btn-acao:hover { text-decoration: underline; }

        .legenda-risco { display: flex; justify-content: center; margin-top: 30px; width: 80%; margin-left: auto; margin-right: auto;}
        .legenda-risco table { margin-top: 5px;}
        .legenda-risco th, .legenda-risco td { padding: 5px; font-size: 0.8rem;}

        .btn-voltar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <a href="menuFuncionarios.html" class="btn-voltar">← Voltar para o Menu de Funcionários</a>

    <div class="card">
        <div class="header-menu">
            <div>
                <span>Início</span>
                <span>Agendamentos</span>
                <span>Pacientes</span>
                <span>Relatórios</span>
            </div>
            <span>Login</span>
        </div>

        <h2>Agenda do dia: 16/03/2026</h2>
        
        <table>
            <thead>
                <tr>
                    <th class="col-horario">8:00</th>
                    <th>Pacientes</th>
                    <th>Procedimento</th>
                    <th>Risco de falta</th>
                    <th>Ações rápidas</th>
                </tr>
            </thead>
            <tbody id="tabela-agendamentos">
                <!-- Linhas inseridas pelo JS -->
            </tbody>
        </table>

        <div class="legenda-risco">
            <table>
                 <thead>
                    <tr>
                        <th style="border: none;"></th>
                        <th style="border: none; font-weight: normal; font-size: 0.8rem;">Baixo</th>
                        <th style="border: none; font-weight: normal; font-size: 0.8rem;">Mediano</th>
                        <th style="border: none; font-weight: normal; font-size: 0.8rem;">Alto</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="background-color: #e9ecef;">Nível de risco</td>
                        <td>de 1% até 35%</td>
                        <td>de 36% até 60%</td>
                        <td>acima de 60%</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // Dados mockados baseados no wireframe "Agendamentos - História 1"
        const dadosAgendamentos = [
            { horario: "9:00", paciente: "Maria Júlia de souza", procedimento: "?", risco: "15%", classRisco: "baixo" },
            { horario: "10:00", paciente: "Eduardo Henrique Alves", procedimento: "?", risco: "85%", classRisco: "alto" },
            { horario: "11:00", paciente: "Sofia Rodrigues", procedimento: "?", risco: "40%", classRisco: "mediano" },
            { horario: "14:00", paciente: "João Cavalcante", procedimento: "?", risco: "60%", classRisco: "mediano" }
        ];

        function carregarPainel() {
            const corpoAgendamentos = document.getElementById('tabela-agendamentos');
            corpoAgendamentos.innerHTML = "";

            dadosAgendamentos.forEach(a => {
                let textoRisco = a.risco ? `${a.risco} (${a.classRisco})` : "";
                let botaoAcao = a.paciente ? `<button class="btn-acao" onclick="confirmarAgendamento('${a.paciente}')">Confirmar [x]</button>` : "";

                corpoAgendamentos.innerHTML += `
                    <tr>
                        <td class="col-horario">${a.horario}</td>
                        <td class="col-paciente">${a.paciente}</td>
                        <td>${a.procedimento}</td>
                        <td>${textoRisco}</td>
                        <td>${botaoAcao}</td>
                    </tr>
                `;
            });
        }

        function confirmarAgendamento(nome) {
            alert("Agendamento de " + nome + " confirmado!");
        }

        carregarPainel();
    </script>
</body>
</html>
