<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Innovare - Gestão de Risco</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }
        .btn-voltar {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
        }
        .btn-voltar:hover { text-decoration: underline; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 900px;
            margin: 0 auto;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 24px;
            color: #222;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
        }
        th, td {
            padding: 12px 14px;
            text-align: center;
            font-size: 0.9rem;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f7f7f7;
            font-weight: 600;
            color: #555;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fafafa; }
        .col-paciente { text-align: left; }
        .btn-acao {
            background-color: #4a7fe5;
            color: #fff;
            border: none;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .btn-acao:hover { background-color: #3a6fd4; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: 0 auto;">
        <a href="menuFuncionarios.html" class="btn-voltar">← Voltar para o Menu de Funcionários</a>
    </div>

    <div class="card">
        <h2>Agendamentos</h2>
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Pacientes</th>
                    <th>Procedimento</th>
                    <th>Risco de falta</th>
                    <th>Ações rápidas</th>
                </tr>
            </thead>
            <tbody id="tabela-agendamentos"></tbody>
        </table>
    </div>

    <script>
        const API = 'http://localhost:8080';

        async function getRisco(id) {
            try {
                const res = await fetch(`${API}/api/risco/${id}`);
                if (!res.ok) return null;
                return await res.json();
            } catch { return null; }
        }

        async function carregarPainel() {
            const corpo = document.getElementById('tabela-agendamentos');
            corpo.innerHTML = '<tr><td colspan="6">Carregando...</td></tr>';

            try {
                const res = await fetch(`${API}/api/agendamentos`);
                const agendamentos = await res.json();

                const comRisco = await Promise.all(
                    agendamentos.map(async (a) => {
                        const risco = await getRisco(a.id);
                        return { ...a, risco };
                    })
                );

                corpo.innerHTML = '';

                if (comRisco.length === 0) {
                    corpo.innerHTML = '<tr><td colspan="6">Nenhum agendamento encontrado.</td></tr>';
                    return;
                }

                comRisco.forEach(a => {
                    const data = a.data
                        ? new Date(a.data + 'T00:00:00').toLocaleDateString('pt-BR')
                        : '-';
                    const riscoTexto = a.risco?.nivelRisco ?? '-';
                    const prob = a.Probabilidade_Falta != null
                        ? `${(a.Probabilidade_Falta * 100).toFixed(0)}% (${riscoTexto})`
                        : riscoTexto;
                    const horario = a.hora ?? '-';
                    const nome = a.paciente?.nome ?? '-';
                    const procedimento = a.Tipo_Procedimento ?? '?';

                    corpo.innerHTML += `
                        <tr>
                            <td>${data}</td>
                            <td>${horario}</td>
                            <td class="col-paciente">${nome}</td>
                            <td>${procedimento}</td>
                            <td>${prob}</td>
                            <td><button class="btn-acao" onclick="confirmarAgendamento(${a.id})">Marcar Falta</button></td>
                        </tr>`;
                });

            } catch (err) {
                corpo.innerHTML = '<tr><td colspan="6">Erro ao carregar agendamentos.</td></tr>';
                console.error(err);
            }
        }

        async function confirmarAgendamento(id) {
            const res = await fetch(`${API}/api/agendamentos/${id}/falta`, { method: 'PATCH' });
            if (res.ok) {
                alert('Falta registrada com sucesso!');
                carregarPainel();
            } else {
                alert('Erro ao registrar falta.');
            }
        }

        carregarPainel();
    </script>
</body>
</html>
