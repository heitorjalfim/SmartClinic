<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Innovare - Gestão de Risco</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-falta { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-falta:hover { background-color: #a71d2a; }
        .btn-voltar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
    <a href="/" class="btn-voltar">← Voltar para Agendamento</a>
    <h2>Painel de Pacientes (Geral)</h2>
    <table>
        <thead>
            <tr>
                <th>Paciente</th>
                <th>CPF</th>
                <th>Agendamentos</th>
                <th>Faltas</th>
                <th>Score Honra</th>
                <th>Risco Médio</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-pacientes"></tbody>
    </table>

    <hr>

    <h2>Próximos Agendamentos (Detalhados)</h2>
    <table>
        <thead>
            <tr>
                <th>Paciente</th>
                <th>CPF</th>
                <th>Procedimento</th>
                <th>Valor</th>
                <th>Lead Time</th>
                <th>Risco Atual</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela-agendamentos"></tbody>
    </table>

    <script>
        // Função para carregar a lista de pacientes
        async function carregarPainel() {
            try {
                // 1. Busca e carrega a tabela de Pacientes
                const resPacientes = await fetch('/api/painel');
                const pacientes = await resPacientes.json();
                const corpoPacientes = document.getElementById('tabela-pacientes');
                corpoPacientes.innerHTML = "";

                pacientes.forEach(p => {
                    let risco = 10.0;
                    if (p.totalAgendamentos > 1) {
                        risco = (p.totalFaltas / p.totalAgendamentos) * 100;
                    }
                    
                    corpoPacientes.innerHTML += `
                        <tr>
                            <td>${p.nome}</td>
                            <td>${p.cpf}</td>
                            <td>${p.totalAgendamentos}</td>
                            <td>${p.totalFaltas}</td>
                            <td>${p.scoreHonra || 0}</td>
                            <td><strong>${risco.toFixed(2)}%</strong></td>
                            <td>
                                <button class="btn-falta" onclick="registrarFalta('${p.cpf}')">Registrar Falta</button>
                            </td>
                        </tr>
                    `;
                });

                // 2. Busca e carrega a tabela de Agendamentos
                const resAgendamentos = await fetch('/api/lista-agendamentos');
                const agendamentos = await resAgendamentos.json();
                const corpoAgendamentos = document.getElementById('tabela-agendamentos');
                corpoAgendamentos.innerHTML = "";

                agendamentos.forEach(a => {
                    corpoAgendamentos.innerHTML += `
                        <tr>
                            <td>${a.paciente.nome}</td>
                            <td>${a.paciente.cpf}</td>
                            <td>${a.tipoProcedimento}</td>
                            <td>R$ ${a.valorProcedimento.toFixed(2)}</td>
                            <td>${a.leadTime} dias</td>
                            <td><strong>${a.scoreRisco.toFixed(2)}%</strong></td>
                            <td>
                                <button class="btn-falta" onclick="registrarFalta('${a.paciente.cpf}')">Registrar Falta</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
            }
        }

        // Função que chama a API para aumentar as faltas
        async function registrarFalta(cpf) {
            if (confirm("Confirmar registro de falta para o CPF " + cpf + "?")) {
                const response = await fetch(`/api/registrar-falta?cpf=${cpf}`);
                const mensagem = await response.text();
                alert(mensagem);
                carregarPainel(); // Recarrega a tabela para mostrar o novo risco
            }
        }

        carregarPainel();
    </script>
</body>
</html>
