<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clínica Innovare - Agendamento</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f5f5f5; /* Fundo cinza claro igual ao mockup */
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }

        .form-container { 
            background-color: #ffffff; 
            padding: 40px; 
            border-radius: 8px; 
            border: 1px solid #e0e0e0; 
            width: 100%; 
            max-width: 450px; 
        }

        h2 { 
            text-align: center; 
            margin-bottom: 25px; 
            color: #000; 
            font-size: 1.4rem;
        }

        .form-group { 
            margin-bottom: 15px; 
        }

        label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
            font-size: 0.95rem; 
            color: #000;
        }

        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background-color: #fff;
        }

        input::placeholder {
            color: #888;
        }

        .btn-primary { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 15px; 
            font-weight: bold;
        }

        .btn-secondary { 
            width: 100%; 
            padding: 12px; 
            background-color: #6c757d; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 1rem; 
            cursor: pointer; 
            margin-top: 10px; 
            font-weight: bold;
        }

        .btn-primary:hover { background-color: #0069d9; }
        .btn-secondary:hover { background-color: #5a6268; }

    </style>
</head>
<body>

    <div class="form-container">
        <h2>Insira suas informações</h2>

        <div class="form-group">
            <label>Nome:</label>
            <input type="text" id="nome" placeholder="Nome completo">
        </div>

        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="form-group">
            <label>Telefone:</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000">
        </div>

        <div class="form-group">
            <label>Endereço:</label>
            <input type="text" id="endereco" placeholder="Rua, número, bairro">
        </div>

        <div class="form-group">
            <label>Data:</label>
            <input type="date" id="data" onchange="mostrarHorarios()">
        </div>

        <div class="form-group" id="bloco-horario" style="display: none;">
            <label>Horário:</label>
            <select id="horario">
                <option value="" disabled selected>Selecione um horário</option>
                <option value="08:00:00">08:00</option>
                <option value="09:00:00">09:00</option>
                <option value="10:00:00">10:00</option>
                <option value="11:00:00">11:00</option>
                <option value="14:00:00">14:00</option>
                <option value="15:00:00">15:00</option>
                <option value="16:00:00">16:00</option>
                <option value="17:00:00">17:00</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tipo do Procedimento:</label>
            <select id="tipo">
                <option value="Estético">Estético</option>
                <option value="Cirúrgico">Cirúrgico</option>
                <option value="Manutenção">Manutenção</option>
            </select>
        </div>

        <div class="form-group">
            <label>Valor do Procedimento (R$):</label>
            <input type="number" id="valor" step="0.01" placeholder="0.00">
        </div>

        <button class="btn-primary" onclick="enviarAgendamento()">Registrar</button>
        <button class="btn-secondary" onclick="window.location.href='menuClientes.html'">Voltar</button>
    </div>

<script>
    // Função para mostrar o campo de horário apenas após escolher a data
    function mostrarHorarios() {
        const dataEscolhida = document.getElementById('data').value;
        const blocoHorario = document.getElementById('bloco-horario');
        
        if (dataEscolhida) {
            blocoHorario.style.display = 'block';
        } else {
            blocoHorario.style.display = 'none';
        }
    }

    async function enviarAgendamento() {
        console.log("1. Botão clicado! Iniciando processo...");
        
        // botão com feedback visual
        const btn = document.querySelector('.btn-primary');
        const textoOriginal = btn.innerText;
        btn.innerText = "Registrando...";
        btn.disabled = true;

        try {
            const dataSelecionada = document.getElementById('data').value;
            const horarioSelecionado = document.getElementById('horario').value;
            const nomeDigitado = document.getElementById('nome').value;

            console.log("2. Dados obrigatórios:", { nome: nomeDigitado, data: dataSelecionada, hora: horarioSelecionado });
            
            if(!nomeDigitado || !dataSelecionada || !horarioSelecionado) {
                alert("Por favor, preencha os campos obrigatórios (Nome, Data e Horário).");
                btn.innerText = textoOriginal;
                btn.disabled = false;
                return;
            }

            let valorInput = document.getElementById('valor').value;
            let valorFormatado = valorInput ? parseFloat(valorInput) : 0.0;

            const dados = {
                eMail: document.getElementById('email').value,
                nomePaciente: nomeDigitado,
                localidade: document.getElementById('endereco').value,
                hora: horarioSelecionado,
                data: dataSelecionada,
                valor_procedimento: valorFormatado,
                tipo_procedimento: document.getElementById('tipo').value,
                telefone: document.getElementById('telefone').value
            };

            console.log("3. Pacote JSON montado para envio:", dados);

            const response = await fetch('/api/agendamentos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            console.log("4. Status da resposta do servidor:", response.status);

            if (!response.ok) {
                const erroServidor = await response.text();
                console.error("ERRO NO BACKEND:", erroServidor);
                throw new Error("Erro no servidor: " + response.status);
            }

            const resultado = await response.json();
            console.log("5. Sucesso absoluto!", resultado);
            
            alert("Sucesso! Agendamento registrado no sistema.");
            location.reload(); 

        } catch (error) {
            console.error("X. Ocorreu um erro no script:", error);
            alert("Erro ao salvar. Aperte F12 e veja a aba 'Console' para detalhes.");
        } finally {
            // Restaura o botão caso dê erro
            btn.innerText = textoOriginal;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
